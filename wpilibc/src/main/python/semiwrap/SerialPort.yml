---

classes:
  frc::SerialPort:
    enums:
      Port:
      Parity:
      StopBits:
      FlowControl:
      WriteBufferMode:
    methods:
      SerialPort:
        overloads:
          int, Port, int, Parity, StopBits:
          int, std::string_view, Port, int, Parity, StopBits:
      SetFlowControl:
      EnableTermination:
        param_override:
          terminator:
            default: "'\\n'"
      DisableTermination:
      GetBytesReceived:
      Read:
      Write:
        overloads:
          const char*, int:
          std::string_view:
            ignore: true
      SetTimeout:
      SetReadBufferSize:
      SetWriteBufferSize:
      SetWriteBufferMode:
      Flush:
      Reset:
