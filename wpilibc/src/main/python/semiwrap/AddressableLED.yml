---

functions:
  format_as:
    ignore: true

classes:
  frc::AddressableLED:
    enums:
      ColorOrder:
    methods:
      AddressableLED:
      GetChannel:
      SetColorOrder:
      SetStart:
      GetStart:
      SetLength:
      SetData:
        overloads:
          std::span<const LEDData>:
          std::initializer_list<LEDData>:
            ignore: true
      SetGlobalData:
  frc::AddressableLED::LEDData:
    force_no_trampoline: true
    methods:
      LEDData:
        overloads:
          "":
          int, int, int:
      SetRGB:
      SetHSV:
      SetLED:
        overloads:
          const Color&:
          const Color8Bit&:
